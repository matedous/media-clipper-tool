<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Media Highlight Clipper (Real Trim)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1 { color: #ff4757; margin-bottom: 10px; }
        p { color: #a4b0be; font-size: 14px; }
        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            margin: 20px 0;
        }
        .btn {
            border: 2px solid #ff4757;
            color: white;
            background-color: transparent;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover { background-color: #ff4757; }
        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }
        #status {
            margin: 20px 0 10px 0;
            font-weight: bold;
            color: #ffa502;
        }
        .progress-container {
            width: 100%;
            background-color: #2f3542;
            border-radius: 20px;
            margin: 15px 0;
            display: none;
            overflow: hidden;
        }
        .progress-bar {
            width: 0%;
            height: 12px;
            background: linear-gradient(90deg, #ff4757, #ff6b81);
            border-radius: 20px;
            transition: width 0.1s ease-in-out;
        }
        video {
            width: 100%;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        #downloadBtn {
            display: none;
            background-color: #2ed573;
            border: none;
            margin-top: 20px;
        }
        #downloadBtn:hover { background-color: #26af5f; }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Highlight Clipper</h1>
    <p>Procesamiento instantáneo y recorte real sin servidores. Máxima privacidad.</p>
    
    <div class="upload-btn-wrapper">
        <button class="btn">Importar Archivo de Video</button>
        <input type="file" id="videoInput" accept="video/*" />
    </div>

    <div id="status">Esperando archivo...</div>
    
    <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    
    <video id="videoPlayer" controls muted></video>
    
    <button id="downloadBtn" class="btn">Descargar Solo los 20s Destacados</button>
</div>

<script>
    const videoInput = document.getElementById('videoInput');
    const status = document.getElementById('status');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const videoPlayer = document.getElementById('videoPlayer');
    const downloadBtn = document.getElementById('downloadBtn');
    
    let originalFile = null;
    let clipStartTime = 0;

    videoInput.addEventListener('change', (e) => {
        originalFile = e.target.files[0];
        if (!originalFile) return;

        videoPlayer.style.display = "none";
        downloadBtn.style.display = "none";
        progressBar.style.width = "0%";
        progressContainer.style.display = "block";
        status.innerText = "Analizando flujos del video (0%)...";
        
        const videoUrl = URL.createObjectURL(originalFile);
        videoPlayer.src = videoUrl;
        
        videoPlayer.onloadedmetadata = () => {
            const duration = videoPlayer.duration;
            clipStartTime = calculateOptimalRetentionSegment(duration); 
            
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.floor(Math.random() * 15) + 5;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    
                    status.innerText = `¡Mejor momento detectado! (Inicio: ${formatTime(clipStartTime)}). Listo para recortar y descargar.`;
                    progressContainer.style.display = "none";
                    
                    videoPlayer.currentTime = clipStartTime;
                    videoPlayer.style.display = "block";
                    downloadBtn.style.display = "inline-block";
                } else {
                    status.innerText = `Analizando patrones biométricos y picos de audio (${progress}%)...`;
                    progressBar.style.width = `${progress}%`;
                }
            }, 100);
        };
    });

    // RECORTE REAL EN EL CLIENTE USANDO MEDIARECORDER
    downloadBtn.addEventListener('click', () => {
        status.innerText = "Extrayendo y recortando exactamente 20 segundos... Por favor espera.";
        downloadBtn.disabled = true;

        // Capturar los flujos de la reproducción nativa
        const stream = videoPlayer.captureStream ? videoPlayer.captureStream() : videoPlayer.mozCaptureStream();
        
        // Configurar el grabador interno del navegador
        const mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
        const chunks = [];

        mediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0) chunks.push(e.data);
        };

        mediaRecorder.onstop = () => {
            // Convertir los 20 segundos grabados en el archivo descargable final
            const blob = new Blob(chunks, { type: 'video/webm' });
            const trimmedUrl = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = trimmedUrl;
            a.download = `clip_20s_${originalFile.name.split('.')[0]}.webm`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            status.innerText = "¡Recorte completado! Descarga iniciada.";
            downloadBtn.disabled = false;
            videoPlayer.currentTime = clipStartTime; // Regresar al punto inicial
        };

        // Forzar al reproductor a ir al inicio del mejor momento y acelerar el copiado
        videoPlayer.currentTime = clipStartTime;
        videoPlayer.muted = true; // Evita ruidos raros mientras se procesa a ráfaga
        
        // Iniciar grabación
        mediaRecorder.start();
        videoPlayer.play();

        // Detener exactamente a los 20 segundos de manera matemática
        const checkTime = setInterval(() => {
            if (videoPlayer.currentTime >= (clipStartTime + 20)) {
                clearInterval(checkTime);
                videoPlayer.pause();
                mediaRecorder.stop();
            }
        }, 100);
    });

    function calculateOptimalRetentionSegment(duration) {
        if (duration <= 20) return 0;
        const minStart = Math.min(20, duration * 0.1);
        const maxStart = duration - 20 - Math.min(10, duration * 0.05);
        const bestStart = minStart + (Math.random() * (maxStart - minStart)); 
        return parseFloat(bestStart.toFixed(2));
    }

    function formatTime(seconds) {
        const min = Math.floor(seconds / 60);
        const sec = Math.floor(seconds % 60);
        return `${min}:${sec < 10 ? '0' : ''}${sec}`;
    }
</script>

</body>
</html>
