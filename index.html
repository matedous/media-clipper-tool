<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Media Highlight Clipper (Cognitive Focus Engine)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1 { color: #ff4757; margin-bottom: 10px; }
        p { color: #a4b0be; font-size: 14px; }
        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            margin: 20px 0;
        }
        .btn {
            border: 2px solid #ff4757;
            color: white;
            background-color: transparent;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover { background-color: #ff4757; }
        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }
        #status {
            margin: 20px 0 10px 0;
            font-weight: bold;
            color: #ffa502;
        }
        .progress-container {
            width: 100%;
            background-color: #2f3542;
            border-radius: 20px;
            margin: 15px 0;
            display: none;
            overflow: hidden;
        }
        .progress-bar {
            width: 0%;
            height: 12px;
            background: linear-gradient(90deg, #e056fd, #be2edd);
            border-radius: 20px;
            transition: width 0.2s linear;
        }
        video {
            width: 100%;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
            background: #000;
        }
        #downloadBtn {
            display: none;
            background-color: #ff4757;
            border: none;
            margin-top: 20px;
        }
        #downloadBtn:hover { background-color: #ff6b81; }
        #downloadBtn:disabled { background-color: #555; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Highlight Clipper</h1>
    <p>Motor Cognitivo enfocado en intensidad visual y biométrica.</p>
    
    <div class="upload-btn-wrapper">
        <button class="btn" id="uploadBtnLabel">Importar Archivo de Video</button>
        <input type="file" id="videoInput" accept="video/*" />
    </div>

    <div id="status">Esperando archivo...</div>
    
    <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    
    <video id="videoPlayer" controls playsinline></video>
    
    <button id="downloadBtn" class="btn">✂️ Recortar y Descargar Clímax (20s)</button>
</div>

<script>
    const videoInput = document.getElementById('videoInput');
    const status = document.getElementById('status');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const videoPlayer = document.getElementById('videoPlayer');
    const downloadBtn = document.getElementById('downloadBtn');
    
    let originalFile = null;
    let clipStartTime = 0;

    videoInput.addEventListener('change', async (e) => {
        originalFile = e.target.files[0];
        if (!originalFile) return;

        videoPlayer.style.display = "none";
        downloadBtn.style.display = "none";
        progressContainer.style.display = "block";
        progressBar.style.width = "0%";
        
        status.innerText = "Iniciando escaneo biométrico y rítmico del video...";
        
        const videoUrl = URL.createObjectURL(originalFile);
        videoPlayer.src = videoUrl;
        
        videoPlayer.onloadedmetadata = async () => {
            const duration = videoPlayer.duration;
            
            // Llamada al motor de análisis cognitivo
            clipStartTime = await analyzeCognitiveClimax(originalFile, duration, (percent) => {
                progressBar.style.width = `${percent}%`;
                status.innerText = `Evaluando densidad visual, fricción e impacto psicológico (${percent}%)...`;
            });
            
            status.innerText = `¡Clímax Cognitivo detectado! (Inicio: ${formatTime(clipStartTime)}). Revisa y haz clic en Recortar.`;
            
            progressContainer.style.display = "none";
            videoPlayer.currentTime = clipStartTime;
            videoPlayer.style.display = "block";
            downloadBtn.style.display = "inline-block";
        };
    });

    downloadBtn.addEventListener('click', () => {
        downloadBtn.disabled = true;
        videoInput.disabled = true;
        progressContainer.style.display = "block";
        progressBar.style.width = "0%";
        
        videoPlayer.volume = 0.05; 
        videoPlayer.currentTime = clipStartTime;
        
        let stream;
        if (videoPlayer.captureStream) {
            stream = videoPlayer.captureStream();
        } else if (videoPlayer.mozCaptureStream) {
            stream = videoPlayer.mozCaptureStream();
        } else {
            alert("Tu navegador no soporta el recorte interno. Usa Chrome, Edge o Firefox.");
            return;
        }

        const mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        const chunks = [];

        mediaRecorder.ondataavailable = (e) => {
            if (e.data && e.data.size > 0) chunks.push(e.data);
        };

        mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const finalUrl = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = finalUrl;
            a.download = `Max_Impact_20s_${originalFile.name.split('.')[0]}.webm`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            status.innerText = "¡Recorte completado con éxito! Archivo de 20s descargado.";
            downloadBtn.disabled = false;
            videoInput.disabled = false;
            progressContainer.style.display = "none";
            videoPlayer.pause();
            videoPlayer.volume = 1.0;
        };

        mediaRecorder.start();
        videoPlayer.play();

        let timeElapsed = 0;
        const totalDuration = 20; 
        
        const timerInterval = setInterval(() => {
            timeElapsed += 1;
            const percentage = (timeElapsed / totalDuration) * 100;
            progressBar.style.width = `${percentage}%`;
            status.innerText = `Renderizando segmento de máxima atención: ${timeElapsed}s / 20s...`;

            if (timeElapsed >= totalDuration) {
                clearInterval(timerInterval);
                mediaRecorder.stop(); 
            }
        }, 1000); 
    });

    /**
     * MOTOR DE ANÁLISIS COGNITIVO
     * Escanea densidad de tonos corporales y movimiento rítmico para aproximarse
     * a los picos de excitación visual.
     */
    async function analyzeCognitiveClimax(file, duration, updateProgress) {
        return new Promise((resolve) => {
            if (duration <= 20) resolve(0);

            const tempVid = document.createElement('video');
            tempVid.src = URL.createObjectURL(file);
            tempVid.muted = true;
            tempVid.playsInline = true;

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            
            const scanInterval = 1.5; // Escaneo más rápido para detectar ritmo
            const scores = [];
            let lastImageData = null;

            tempVid.addEventListener('loadeddata', () => {
                canvas.width = 64; 
                canvas.height = 64;
                tempVid.currentTime = 0;
            });

            tempVid.addEventListener('seeked', () => {
                ctx.drawImage(tempVid, 0, 0, canvas.width, canvas.height);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                
                let motionIntensity = 0;
                let skinMotionMultiplier = 0;

                for (let i = 0; i < imageData.length; i += 4) {
                    const r = imageData[i];
                    const g = imageData[i+1];
                    const b = imageData[i+2];
                    
                    // Algoritmo heurístico para detectar espectro cromático de piel humana
                    const isSkinTone = (r > 95 && g > 40 && b > 20 && 
                                      Math.max(r,g,b) - Math.min(r,g,b) > 15 && 
                                      Math.abs(r-g) > 15 && r > g && r > b);

                    if (lastImageData) {
                        const diff = Math.abs(r - lastImageData[i]) + 
                                     Math.abs(g - lastImageData[i+1]) + 
                                     Math.abs(b - lastImageData[i+2]);
                        
                        // Solo contar movimientos bruscos/rítmicos
                        if (diff > 40) {
                            motionIntensity += 1;
                            // Si el movimiento ocurre en un área con tono de piel, el peso cognitivo se multiplica
                            if (isSkinTone) {
                                skinMotionMultiplier += 3; 
                            }
                        }
                    }
                }
                
                lastImageData = imageData;
                
                // La puntuación combina el movimiento general con el movimiento enfocado en tonos de piel
                scores.push({
                    time: tempVid.currentTime,
                    score: motionIntensity + skinMotionMultiplier
                });

                const percentDone = Math.min(99, Math.round((tempVid.currentTime / duration) * 100));
                updateProgress(percentDone);

                if (tempVid.currentTime < duration - 20) { 
                    tempVid.currentTime += scanInterval;
                } else {
                    let maxArousalScore = 0;
                    let bestStartTime = 0;
                    const samplesInWindow = Math.floor(20 / scanInterval); 
                    
                    for (let i = 0; i <= scores.length - samplesInWindow; i++) {
                        let windowIntensity = 0;
                        for (let j = 0; j < samplesInWindow; j++) {
                            windowIntensity += scores[i+j].score;
                        }
                        
                        // Factor psicológico: El interés decae en los primeros minutos y repunta hacia el final
                        const timePercentage = scores[i].time / duration;
                        let psychologicalMultiplier = 1.0;
                        
                        if (timePercentage >= 0.65 && timePercentage <= 0.90) {
                            psychologicalMultiplier = 2.0; // Pico de expectativa
                        } else if (timePercentage >= 0.30 && timePercentage < 0.65) {
                            psychologicalMultiplier = 1.2; // Aumento de la tensión
                        } else {
                            psychologicalMultiplier = 0.5; // Introducciones o desenlaces
                        }
                        
                        const finalScore = windowIntensity * psychologicalMultiplier;

                        if (finalScore > maxArousalScore) {
                            maxArousalScore = finalScore;
                            bestStartTime = scores[i].time;
                        }
                    }
                    
                    resolve(bestStartTime || 0);
                }
            });
        });
    }

    function formatTime(seconds) {
        const min = Math.floor(seconds / 60);
        const sec = Math.floor(seconds % 60);
        return `${min}:${sec < 10 ? '0' : ''}${sec}`;
    }
</script>

</body>
</html>
