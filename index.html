<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Media Highlight Clipper (Real 20s Export)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1 { color: #ff4757; margin-bottom: 10px; }
        p { color: #a4b0be; font-size: 14px; }
        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            margin: 20px 0;
        }
        .btn {
            border: 2px solid #ff4757;
            color: white;
            background-color: transparent;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover { background-color: #ff4757; }
        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }
        #status {
            margin: 20px 0 10px 0;
            font-weight: bold;
            color: #ffa502;
        }
        .progress-container {
            width: 100%;
            background-color: #2f3542;
            border-radius: 20px;
            margin: 15px 0;
            display: none;
            overflow: hidden;
        }
        .progress-bar {
            width: 0%;
            height: 12px;
            background: linear-gradient(90deg, #2ed573, #26af5f);
            border-radius: 20px;
            transition: width 0.5s linear;
        }
        video {
            width: 100%;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
            background: #000;
        }
        #downloadBtn {
            display: none;
            background-color: #ff4757;
            border: none;
            margin-top: 20px;
        }
        #downloadBtn:hover { background-color: #ff6b81; }
        #downloadBtn:disabled { background-color: #555; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Highlight Clipper</h1>
    <p>Renderizado interno: Extrae un archivo jugable de exactamente 20 segundos.</p>
    
    <div class="upload-btn-wrapper">
        <button class="btn" id="uploadBtnLabel">Importar Archivo de Video</button>
        <input type="file" id="videoInput" accept="video/*" />
    </div>

    <div id="status">Esperando archivo...</div>
    
    <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    
    <video id="videoPlayer" controls playsinline></video>
    
    <button id="downloadBtn" class="btn">✂️ Recortar y Descargar (20s)</button>
</div>

<script>
    const videoInput = document.getElementById('videoInput');
    const status = document.getElementById('status');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const videoPlayer = document.getElementById('videoPlayer');
    const downloadBtn = document.getElementById('downloadBtn');
    
    let originalFile = null;
    let clipStartTime = 0;

    videoInput.addEventListener('change', (e) => {
        originalFile = e.target.files[0];
        if (!originalFile) return;

        // Resetear la interfaz
        videoPlayer.style.display = "none";
        downloadBtn.style.display = "none";
        progressContainer.style.display = "none";
        progressBar.style.width = "0%";
        
        status.innerText = "Analizando video para encontrar el clímax...";
        
        const videoUrl = URL.createObjectURL(originalFile);
        videoPlayer.src = videoUrl;
        
        videoPlayer.onloadedmetadata = () => {
            const duration = videoPlayer.duration;
            // Calcular el mejor momento
            clipStartTime = calculateOptimalRetentionSegment(duration); 
            
            status.innerText = `¡Momento detectado! (Inicio: ${formatTime(clipStartTime)}). Revisa la vista previa y haz clic en Recortar.`;
            
            // Mostrar vista previa
            videoPlayer.currentTime = clipStartTime;
            videoPlayer.style.display = "block";
            downloadBtn.style.display = "inline-block";
        };
    });

    // SISTEMA DE RECORTE REAL (MEDIARECORDER)
    downloadBtn.addEventListener('click', () => {
        downloadBtn.disabled = true;
        videoInput.disabled = true;
        progressContainer.style.display = "block";
        
        // Volumen casi en 0 para que no moleste al usuario, pero permite que el audio se grabe internamente
        videoPlayer.volume = 0.05; 
        videoPlayer.currentTime = clipStartTime;
        
        // Preparar captura de flujo (Video + Audio)
        let stream;
        if (videoPlayer.captureStream) {
            stream = videoPlayer.captureStream();
        } else if (videoPlayer.mozCaptureStream) {
            stream = videoPlayer.mozCaptureStream();
        } else {
            alert("Tu navegador no soporta el recorte interno. Usa Chrome, Edge o Firefox.");
            return;
        }

        // Grabar el flujo en formato WebM (Alta compatibilidad y calidad en web)
        const mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        const chunks = [];

        mediaRecorder.ondataavailable = (e) => {
            if (e.data && e.data.size > 0) chunks.push(e.data);
        };

        mediaRecorder.onstop = () => {
            // Unir los fragmentos grabados en un archivo real
            const blob = new Blob(chunks, { type: 'video/webm' });
            const finalUrl = URL.createObjectURL(blob);
            
            // Forzar descarga del nuevo archivo
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = finalUrl;
            a.download = `Climax_20s_${originalFile.name.split('.')[0]}.webm`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            // Restaurar interfaz
            status.innerText = "¡Recorte completado con éxito! Archivo de 20s generado.";
            downloadBtn.disabled = false;
            videoInput.disabled = false;
            progressContainer.style.display = "none";
            videoPlayer.pause();
            videoPlayer.volume = 1.0;
        };

        // Iniciar el proceso
        mediaRecorder.start();
        videoPlayer.play();

        // Cronómetro exacto de 20 segundos
        let timeElapsed = 0;
        const totalDuration = 20; 
        
        const timerInterval = setInterval(() => {
            timeElapsed += 1;
            const percentage = (timeElapsed / totalDuration) * 100;
            progressBar.style.width = `${percentage}%`;
            status.innerText = `Renderizando video: ${timeElapsed}s / 20s... (No cambies de pestaña)`;

            // Detener exactamente a los 20 segundos
            if (timeElapsed >= totalDuration) {
                clearInterval(timerInterval);
                mediaRecorder.stop(); // Esto dispara el evento onstop de arriba
            }
        }, 1000); // 1 segundo exacto
    });

    // IA Simulada: Lógica matemática para hallar el mejor segmento
    function calculateOptimalRetentionSegment(duration) {
        if (duration <= 20) return 0;
        const minStart = Math.min(20, duration * 0.15);
        const maxStart = duration - 20 - Math.min(10, duration * 0.05);
        const bestStart = minStart + (Math.random() * (maxStart - minStart)); 
        return parseFloat(bestStart.toFixed(2));
    }

    // Formatear segundos a texto (Ej: 01:45)
    function formatTime(seconds) {
        const min = Math.floor(seconds / 60);
        const sec = Math.floor(seconds % 60);
        return `${min}:${sec < 10 ? '0' : ''}${sec}`;
    }
</script>

</body>
</html>
