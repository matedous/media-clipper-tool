<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Media Highlight Clipper (Sensory Engine)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1 { color: #ff4757; margin-bottom: 10px; }
        p { color: #a4b0be; font-size: 14px; }
        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            margin: 20px 0;
        }
        .btn {
            border: 2px solid #ff4757;
            color: white;
            background-color: transparent;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover { background-color: #ff4757; }
        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }
        #status {
            margin: 20px 0 10px 0;
            font-weight: bold;
            color: #ffa502;
        }
        .progress-container {
            width: 100%;
            background-color: #2f3542;
            border-radius: 20px;
            margin: 15px 0;
            display: none;
            overflow: hidden;
        }
        .progress-bar {
            width: 0%;
            height: 12px;
            background: linear-gradient(90deg, #2ed573, #26af5f);
            border-radius: 20px;
            transition: width 0.2s linear;
        }
        video {
            width: 100%;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
            background: #000;
        }
        #downloadBtn {
            display: none;
            background-color: #ff4757;
            border: none;
            margin-top: 20px;
        }
        #downloadBtn:hover { background-color: #ff6b81; }
        #downloadBtn:disabled { background-color: #555; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Highlight Clipper</h1>
    <p>Motor Neuro-Sensorial activado. Renderizado estricto de 20 segundos.</p>
    
    <div class="upload-btn-wrapper">
        <button class="btn" id="uploadBtnLabel">Importar Archivo de Video</button>
        <input type="file" id="videoInput" accept="video/*" />
    </div>

    <div id="status">Esperando archivo...</div>
    
    <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    
    <video id="videoPlayer" controls playsinline></video>
    
    <button id="downloadBtn" class="btn">✂️ Recortar y Descargar Clímax (20s)</button>
</div>

<script>
    const videoInput = document.getElementById('videoInput');
    const status = document.getElementById('status');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const videoPlayer = document.getElementById('videoPlayer');
    const downloadBtn = document.getElementById('downloadBtn');
    
    let originalFile = null;
    let clipStartTime = 0;

    videoInput.addEventListener('change', async (e) => {
        originalFile = e.target.files[0];
        if (!originalFile) return;

        videoPlayer.style.display = "none";
        downloadBtn.style.display = "none";
        progressContainer.style.display = "block";
        progressBar.style.width = "0%";
        
        status.innerText = "Iniciando escaneo neuro-sensorial del video...";
        
        const videoUrl = URL.createObjectURL(originalFile);
        videoPlayer.src = videoUrl;
        
        videoPlayer.onloadedmetadata = async () => {
            const duration = videoPlayer.duration;
            
            // LLAMADA AL NUEVO MOTOR DE ANÁLISIS REAL
            clipStartTime = await analyzeSensoryClimax(originalFile, duration, (percent) => {
                progressBar.style.width = `${percent}%`;
                status.innerText = `Analizando movimiento, intensidad visual y psicología del acto (${percent}%)...`;
            });
            
            status.innerText = `¡Clímax Neuro-Sensorial detectado! (Inicio: ${formatTime(clipStartTime)}). Revisa y haz clic en Recortar.`;
            
            progressContainer.style.display = "none";
            videoPlayer.currentTime = clipStartTime;
            videoPlayer.style.display = "block";
            downloadBtn.style.display = "inline-block";
        };
    });

    // SISTEMA DE RECORTE INTACTO (El que ya funciona perfecto)
    downloadBtn.addEventListener('click', () => {
        downloadBtn.disabled = true;
        videoInput.disabled = true;
        progressContainer.style.display = "block";
        progressBar.style.width = "0%";
        
        videoPlayer.volume = 0.05; 
        videoPlayer.currentTime = clipStartTime;
        
        let stream;
        if (videoPlayer.captureStream) {
            stream = videoPlayer.captureStream();
        } else if (videoPlayer.mozCaptureStream) {
            stream = videoPlayer.mozCaptureStream();
        } else {
            alert("Tu navegador no soporta el recorte interno. Usa Chrome, Edge o Firefox.");
            return;
        }

        const mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        const chunks = [];

        mediaRecorder.ondataavailable = (e) => {
            if (e.data && e.data.size > 0) chunks.push(e.data);
        };

        mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const finalUrl = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = finalUrl;
            a.download = `Alta_Atraccion_20s_${originalFile.name.split('.')[0]}.webm`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            status.innerText = "¡Recorte completado con éxito! Archivo de 20s descargado.";
            downloadBtn.disabled = false;
            videoInput.disabled = false;
            progressContainer.style.display = "none";
            videoPlayer.pause();
            videoPlayer.volume = 1.0;
        };

        mediaRecorder.start();
        videoPlayer.play();

        let timeElapsed = 0;
        const totalDuration = 20; 
        
        const timerInterval = setInterval(() => {
            timeElapsed += 1;
            const percentage = (timeElapsed / totalDuration) * 100;
            progressBar.style.width = `${percentage}%`;
            status.innerText = `Extrayendo estímulos y renderizando clip: ${timeElapsed}s / 20s...`;

            if (timeElapsed >= totalDuration) {
                clearInterval(timerInterval);
                mediaRecorder.stop(); 
            }
        }, 1000); 
    });

    /**
     * MOTOR NEURO-SENSORIAL DE ANÁLISIS
     * Escanea físicamente los fotogramas del video para detectar la mayor intensidad
     * de movimiento y aplica la curva de retención psicológica humana.
     */
    async function analyzeSensoryClimax(file, duration, updateProgress) {
        return new Promise((resolve) => {
            if (duration <= 20) resolve(0);

            const tempVid = document.createElement('video');
            tempVid.src = URL.createObjectURL(file);
            tempVid.muted = true;
            tempVid.playsInline = true;

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            
            const scanInterval = 2; // Analiza un fotograma cada 2 segundos
            const scores = [];
            let lastImageData = null;

            tempVid.addEventListener('loadeddata', () => {
                // Resolución ultra-baja para que el escaneo sea rápido pero detecte movimiento
                canvas.width = 64; 
                canvas.height = 64;
                tempVid.currentTime = 0;
            });

            tempVid.addEventListener('seeked', () => {
                // Dibujar el fotograma actual en el lienzo virtual
                ctx.drawImage(tempVid, 0, 0, canvas.width, canvas.height);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                
                let motionIntensity = 0;
                let brightnessLevel = 0;

                // Analizar los píxeles
                for (let i = 0; i < imageData.length; i += 4) {
                    const r = imageData[i];
                    const g = imageData[i+1];
                    const b = imageData[i+2];
                    
                    brightnessLevel += (r + g + b) / 3;

                    // Si hay un fotograma anterior, calcular la fricción/movimiento (diferencia de píxeles)
                    if (lastImageData) {
                        motionIntensity += Math.abs(r - lastImageData[i]) + 
                                           Math.abs(g - lastImageData[i+1]) + 
                                           Math.abs(b - lastImageData[i+2]);
                    }
                }
                
                lastImageData = imageData;
                
                // Guardar la puntuación sensorial de este instante
                scores.push({
                    time: tempVid.currentTime,
                    score: motionIntensity + (brightnessLevel * 0.2) // Prioriza el movimiento físico
                });

                // Actualizar barra de progreso al usuario
                const percentDone = Math.min(99, Math.round((tempVid.currentTime / duration) * 100));
                updateProgress(percentDone);

                // Avanzar en el video
                if (tempVid.currentTime < duration - 20) { 
                    tempVid.currentTime += scanInterval;
                } else {
                    // ESCANEO TERMINADO - CALCULAR EL CLÍMAX PSICOLÓGICO
                    let maxDopamineScore = 0;
                    let bestStartTime = 0;

                    // Una ventana de 20s equivale a 10 muestras continuas
                    const samplesInWindow = 10; 
                    
                    for (let i = 0; i <= scores.length - samplesInWindow; i++) {
                        let windowIntensity = 0;
                        for (let j = 0; j < samplesInWindow; j++) {
                            windowIntensity += scores[i+j].score;
                        }
                        
                        // APLICAR PSICOLOGÍA COGNITIVA: Regla del Pico-Final
                        // El cerebro humano experimenta la mayor atracción y satisfacción si el clímax 
                        // ocurre en la zona dorada (entre el 60% y el 85% de la experiencia).
                        const timePercentage = scores[i].time / duration;
                        let psychologicalMultiplier = 1.0;
                        
                        if (timePercentage >= 0.60 && timePercentage <= 0.85) {
                            psychologicalMultiplier = 1.8; // Máxima estimulación neuronal
                        } else if (timePercentage >= 0.40 && timePercentage < 0.60) {
                            psychologicalMultiplier = 1.3; // Calentamiento de la acción
                        } else {
                            psychologicalMultiplier = 0.8; // Se descartan intros largas o finales aburridos
                        }
                        
                        const finalScore = windowIntensity * psychologicalMultiplier;

                        // Determinar los 20 segundos ganadores
                        if (finalScore > maxDopamineScore) {
                            maxDopamineScore = finalScore;
                            bestStartTime = scores[i].time;
                        }
                    }
                    
                    resolve(bestStartTime || 0); // Retorna el inicio exacto
                }
            });
        });
    }

    function formatTime(seconds) {
        const min = Math.floor(seconds / 60);
        const sec = Math.floor(seconds % 60);
        return `${min}:${sec < 10 ? '0' : ''}${sec}`;
    }
</script>

</body>
</html>
