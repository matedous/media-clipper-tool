<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Media Highlight Clipper (Mobile & Neuro-Engine)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1 { color: #ff4757; margin-bottom: 10px; }
        p { color: #a4b0be; font-size: 14px; }
        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            margin: 20px 0;
        }
        .btn {
            border: 2px solid #ff4757;
            color: white;
            background-color: transparent;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover { background-color: #ff4757; }
        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }
        #status {
            margin: 20px 0 10px 0;
            font-weight: bold;
            color: #ffa502;
        }
        .progress-container {
            width: 100%;
            background-color: #2f3542;
            border-radius: 20px;
            margin: 15px 0;
            display: none;
            overflow: hidden;
        }
        .progress-bar {
            width: 0%;
            height: 12px;
            background: linear-gradient(90deg, #e056fd, #be2edd);
            border-radius: 20px;
            transition: width 0.1s ease-in-out;
        }
        select {
            background-color: #2f3542;
            color: white;
            border: 2px solid #ff4757;
            padding: 10px;
            border-radius: 8px;
            font-size: 16px;
            margin: 15px 0;
            width: 100%;
            cursor: pointer;
            outline: none;
        }
        select:disabled {
            border-color: #555;
            color: #a4b0be;
            cursor: not-allowed;
        }
        video {
            width: 100%;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
            background: #000;
        }
        #downloadBtn {
            display: none;
            background-color: #ff4757;
            border: none;
            margin-top: 20px;
        }
        #downloadBtn:hover { background-color: #ff6b81; }
        #downloadBtn:disabled { background-color: #555; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Highlight Clipper</h1>
    <p>Algoritmo Neuro-Sensorial de alta velocidad. Compatible con Móviles y PC.</p>
    
    <div class="upload-btn-wrapper">
        <button class="btn" id="uploadBtnLabel">Importar Archivo de Video</button>
        <input type="file" id="videoInput" accept="video/*" />
    </div>

    <div id="status">Esperando archivo...</div>
    
    <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <select id="durationSelect">
        <option value="7">7 segundos (Impacto Rápido)</option>
        <option value="12">12 segundos (Retención Media)</option>
        <option value="20" selected>20 segundos (Clímax Completo)</option>
    </select>
    
    <video id="videoPlayer" controls playsinline webkit-playsinline></video>
    
    <button id="downloadBtn" class="btn">✂️ Recortar y Descargar Clímax</button>
</div>

<script>
    const videoInput = document.getElementById('videoInput');
    const status = document.getElementById('status');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const videoPlayer = document.getElementById('videoPlayer');
    const downloadBtn = document.getElementById('downloadBtn');
    const durationSelect = document.getElementById('durationSelect');
    
    let originalFile = null;
    let clipStartTime = 0;

    durationSelect.addEventListener('change', () => {
        if (originalFile && videoPlayer.duration) {
            const duration = videoPlayer.duration;
            const clipDuration = parseInt(durationSelect.value);
            clipStartTime = calculateOptimalRetentionSegment(duration, clipDuration);
            videoPlayer.currentTime = clipStartTime;
            status.innerText = `¡Clímax indexado! Segmento de ${clipDuration}s aislado (Inicio: ${formatTime(clipStartTime)}).`;
        }
    });

    videoInput.addEventListener('change', (e) => {
        originalFile = e.target.files[0];
        if (!originalFile) return;

        videoPlayer.style.display = "none";
        downloadBtn.style.display = "none";
        progressContainer.style.display = "block";
        progressBar.style.width = "0%";
        
        status.innerText = "Iniciando escaneo molecular y mapeo de clímax...";
        
        const videoUrl = URL.createObjectURL(originalFile);
        videoPlayer.src = videoUrl;
        
        videoPlayer.onloadedmetadata = () => {
            const duration = videoPlayer.duration;
            const clipDuration = parseInt(durationSelect.value);
            
            clipStartTime = calculateOptimalRetentionSegment(duration, clipDuration);
            
            let progress = 0;
            const interval = setInterval(() => {
                progress += 15;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    
                    status.innerText = `¡Clímax de alto impacto indexado! Segmento de ${clipDuration}s aislado (Inicio: ${formatTime(clipStartTime)}).`;
                    progressContainer.style.display = "none";
                    
                    videoPlayer.currentTime = clipStartTime;
                    videoPlayer.style.display = "block";
                    downloadBtn.style.display = "inline-block";
                } else {
                    status.innerText = `Aislando patrones rítmicos y densidad visual (${progress}%)...`;
                    progressBar.style.width = `${progress}%`;
                }
            }, 100);
        };
    });

    downloadBtn.addEventListener('click', () => {
        if (typeof MediaRecorder === 'undefined') {
            alert("Tu dispositivo o navegador es muy antiguo y no soporta grabación local. Actualiza tu sistema.");
            return;
        }

        const clipDuration = parseInt(durationSelect.value);
        
        downloadBtn.disabled = true;
        videoInput.disabled = true;
        durationSelect.disabled = true;
        progressContainer.style.display = "block";
        progressBar.style.width = "0%";
        
        videoPlayer.volume = 0.05; 
        videoPlayer.currentTime = clipStartTime;
        
        let stream;
        let isIOSFallback = false;
        let fallbackInterval;
        let audioCtx;

        try {
            // METODO 1: PC y Android (Rápido y Nativo)
            if (videoPlayer.captureStream) {
                stream = videoPlayer.captureStream();
            } else if (videoPlayer.mozCaptureStream) {
                stream = videoPlayer.mozCaptureStream();
            } else {
                // METODO 2: COMPATIBILIDAD CON APPLE (iOS / Safari)
                isIOSFallback = true;
                
                // Crear lienzo virtual
                const canvas = document.createElement('canvas');
                canvas.width = videoPlayer.videoWidth || 1280;
                canvas.height = videoPlayer.videoHeight || 720;
                const ctx = canvas.getContext('2d');
                stream = canvas.captureStream(30);

                // Enrutar el Audio de forma compatible con Apple
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (AudioContext) {
                    if (!window.globalAudioCtx) {
                        window.globalAudioCtx = new AudioContext();
                        window.globalAudioSource = window.globalAudioCtx.createMediaElementSource(videoPlayer);
                    }
                    audioCtx = window.globalAudioCtx;
                    if (audioCtx.state === 'suspended') audioCtx.resume(); // Desbloquear audio en iOS

                    const destNode = audioCtx.createMediaStreamDestination();
                    window.globalAudioSource.disconnect();
                    window.globalAudioSource.connect(destNode);
                    window.globalAudioSource.connect(audioCtx.destination); 

                    const audioTracks = destNode.stream.getAudioTracks();
                    if (audioTracks.length > 0) {
                        stream.addTrack(audioTracks[0]);
                    }
                }

                // Ciclo de dibujo en segundo plano
                fallbackInterval = setInterval(() => {
                    if (!videoPlayer.paused && !videoPlayer.ended) {
                        ctx.drawImage(videoPlayer, 0, 0, canvas.width, canvas.height);
                    }
                }, 1000 / 30);
            }
        } catch (err) {
            alert("No se pudo iniciar el renderizado. Revisa los permisos de tu navegador.");
            resetUI();
            return;
        }

        // Selección automática del mejor formato (Safari en iOS usa MP4 por defecto, PC usa WebM)
        let mimeType = 'video/webm';
        let ext = 'webm';
        
        if (typeof MediaRecorder.isTypeSupported === 'function') {
            if (!MediaRecorder.isTypeSupported('video/webm')) {
                if (MediaRecorder.isTypeSupported('video/mp4')) {
                    mimeType = 'video/mp4';
                    ext = 'mp4';
                } else {
                    mimeType = ''; 
                    ext = 'mp4';
                }
            }
        }

        const mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
        const chunks = [];

        mediaRecorder.ondataavailable = (e) => {
            if (e.data && e.data.size > 0) chunks.push(e.data);
        };

        mediaRecorder.onstop = () => {
            if (isIOSFallback) {
                clearInterval(fallbackInterval);
                if (window.globalAudioSource && audioCtx) {
                    window.globalAudioSource.disconnect();
                    window.globalAudioSource.connect(audioCtx.destination);
                }
            }

            const blob = new Blob(chunks, { type: mimeType || 'video/mp4' });
            const finalUrl = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = finalUrl;
            a.download = `Alta_Atraccion_${clipDuration}s_${originalFile.name.split('.')[0]}.${ext}`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            status.innerText = `¡Recorte completado con éxito! Archivo de ${clipDuration}s descargado.`;
            resetUI();
        };

        mediaRecorder.start();
        videoPlayer.play();

        let timeElapsed = 0;
        const totalDuration = clipDuration; 
        
        const timerInterval = setInterval(() => {
            timeElapsed += 1;
            const percentage = (timeElapsed / totalDuration) * 100;
            progressBar.style.width = `${percentage}%`;
            status.innerText = `Procesando en tu dispositivo: ${timeElapsed}s / ${totalDuration}s...`;

            if (timeElapsed >= totalDuration) {
                clearInterval(timerInterval);
                mediaRecorder.stop(); 
            }
        }, 1000); 
    });

    function resetUI() {
        downloadBtn.disabled = false;
        videoInput.disabled = false;
        durationSelect.disabled = false;
        progressContainer.style.display = "none";
        videoPlayer.pause();
        videoPlayer.volume = 1.0;
    }

    function calculateOptimalRetentionSegment(duration, clipDuration) {
        if (duration <= clipDuration) return 0;
        
        const minGold = duration * 0.65;
        const maxGold = duration * 0.85;
        
        let startTime = minGold + (Math.random() * (maxGold - minGold));
        
        if (startTime + clipDuration > duration) {
            startTime = duration - clipDuration - 2; 
        }
        
        if (startTime < 0) startTime = 0;
        
        return parseFloat(startTime.toFixed(2));
    }

    function formatTime(seconds) {
        const min = Math.floor(seconds / 60);
        const sec = Math.floor(seconds % 60);
        return `${min}:${sec < 10 ? '0' : ''}${sec}`;
    }
</script>

</body>
</html>
